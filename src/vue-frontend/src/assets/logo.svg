<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="warmHeart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fad0c4;stop-opacity:1" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Circle/Halo representing eternal connection -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#ffecd2" stroke-width="2" opacity="0.6" />
  
  <!-- Main Heart Shape -->
  <path d="M50 85 C50 85 15 60 15 35 C15 20 28 10 40 10 C47 10 50 18 50 18 C50 18 53 10 60 10 C72 10 85 20 85 35 C85 60 50 85 50 85 Z" 
        fill="url(#warmHeart)" 
        stroke="#ffffff" 
        stroke-width="2"
        filter="url(#softGlow)" />
        
  <!-- Abstract Wave/Voice line inside representing communication -->
  <path d="M35 40 Q50 55 65 40" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8" />
  
  <!-- Small spark/star -->
  <circle cx="75" cy="25" r="3" fill="#ffffff" opacity="0.9" />
</svg>